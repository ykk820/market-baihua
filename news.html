              <strong>營收成長但毛利下滑</strong>
            </button>
          </div>
          <article class="translation-panel" id="translation-panel" aria-live="polite">
            <h3>高利率維持更久</h3>
            <dl>
              <div><dt>原文</dt><dd>央行暗示政策利率可能在高檔停留更長時間。</dd></div>
              <div><dt>白話</dt><dd>借錢成本不會太快下降，企業和房貸族都會感到壓力。</dd></div>
              <div><dt>可能影響</dt><dd>股票估值容易被壓縮，短天期債券利息較有吸引力，美元可能偏強。</dd></div>
            </dl>
          </article>
        </div>
